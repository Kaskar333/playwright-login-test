<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --card: #13131c;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #c8a96e;
      --accent-glow: rgba(200, 169, 110, 0.3);
      --text: #f0ece4;
      --muted: #7a7a8a;
      --error: #e05c6a;
      --success: #5cbf8a;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200, 169, 110, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(100, 80, 200, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 420px;
      padding: 52px 44px 44px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Gold top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 0 0 2px 2px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      -webkit-autofill: unset;
    }

    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #1a1a26 inset !important;
      -webkit-text-fill-color: var(--text) !important;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(200, 169, 110, 0.05);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(224, 92, 106, 0.2);
    }

    input.success {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(92, 191, 138, 0.15);
    }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.2s;
      min-height: 16px;
    }

    .error-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    .btn {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: var(--accent);
      color: #1a1208;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
      filter: brightness(1.08);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.18) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn:hover::after {
      transform: translateX(100%);
    }

    /* Welcome screen */
    .welcome {
      display: none;
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(200, 169, 110, 0.2), rgba(200, 169, 110, 0.05));
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    .welcome h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .welcome h1 span {
      color: var(--accent);
    }

    .welcome p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 20px auto;
      opacity: 0.4;
    }

    .logout-btn {
      margin-top: 24px;
      padding: 9px 22px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>

<body>

  <div class="card" id="card">

    <!-- Login Form -->
    <div id="loginSection">
      <div class="logo">Kaskar</div>
      <div class="tagline">Secure Portal · Sign In</div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="off" />
        <div class="error-msg" id="emailErr"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off" />
        <div class="error-msg" id="passErr"></div>
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- Welcome Screen -->
    <div class="welcome" id="welcomeSection">
      <div class="welcome-icon">✦</div>
      <h1>Welcome Back</h1>
      <div class="divider"></div>
      <p>You have successfully signed in.<br />Glad to have you here.</p>
      <button class="logout-btn" onclick="handleLogout()">← Sign Out</button>
    </div>

  </div>

  <script>
    const VALID_EMAIL = "kaskar@gmail.com";
    const VALID_PASSWORD = "445566";

    function handleLogin() {
      const emailEl = document.getElementById("email");
      const passEl = document.getElementById("password");
      const emailErr = document.getElementById("emailErr");
      const passErr = document.getElementById("passErr");

      // Reset
      [emailEl, passEl].forEach(el => el.classList.remove("error", "success"));
      [emailErr, passErr].forEach(el => { el.textContent = ""; el.classList.remove("show"); });

      const email = emailEl.value.trim();
      const pass = passEl.value;
      let valid = true;

      if (!email) {
        showError(emailEl, emailErr, "Email is required.");
        valid = false;
      } else if (email !== VALID_EMAIL) {
        showError(emailEl, emailErr, "No account found with this email.");
        valid = false;
      }

      if (!pass) {
        showError(passEl, passErr, "Password is required.");
        valid = false;
      } else if (pass !== VALID_PASSWORD) {
        showError(passEl, passErr, "Incorrect password. Please try again.");
        valid = false;
      }

      if (valid) {
        emailEl.classList.add("success");
        passEl.classList.add("success");
        setTimeout(showWelcome, 400);
      }
    }

    function showError(input, msg, text) {
      input.classList.add("error");
      msg.textContent = text;
      msg.classList.add("show");
      input.focus();
    }

    function showWelcome() {
      document.getElementById("loginSection").style.display = "none";
      const ws = document.getElementById("welcomeSection");
      ws.style.display = "block";
    }

    function handleLogout() {
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      ["email", "password"].forEach(id => document.getElementById(id).classList.remove("success", "error"));
      document.getElementById("welcomeSection").style.display = "none";
      document.getElementById("loginSection").style.display = "block";
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginSection").style.display !== "none") {
        handleLogin();
      }
    });
  </script>
</body>

</html>
